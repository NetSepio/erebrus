# gitleaks config — Erebrus node
# Uses the default gitleaks ruleset; this file only adds allowlists.
[extend]
useDefault = true

[allowlist]
description = "templates and docs with placeholder values"
paths = [
  '''\.env\.example$''',
  '''docs/.*''',
  '''\.sample-env$''',
  '''internal/stealth/tlscert\.go$''',
  # Legacy sample configs removed from the tree but still in git history (pre-v2).
  '''(^|.*/)server\.json$''',
  '''(^|.*/)wg0\.conf$''',
  '''blockchain/solana/soon/setdata\.go$''',
]
