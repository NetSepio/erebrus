name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # with_reality_server enables the sing-box REALITY server (stealth carrier);
      # required or the stealth start-test fails. Keep in sync with Makefile/Dockerfile.
      - run: go vet -tags with_reality_server ./...
      - run: go build -tags with_reality_server ./...
      - run: go test -tags with_reality_server ./...
      - uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
          args: --build-tags with_reality_server

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
      # Scan the current tree only — full git history has legacy sample configs.
      - name: Scan for secrets
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --verbose
