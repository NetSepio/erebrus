name: release

# Build static Linux node binaries and attach them to a GitHub Release on tag.
# Nodes are Linux-only; the binary embeds the sing-box REALITY server.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          BIN="erebrus-linux-${{ matrix.arch }}"
          go build -tags with_reality_server \
            -ldflags "-s -w -X github.com/NetSepio/erebrus/internal/config.Version=${GITHUB_REF_NAME}" \
            -o "$BIN" ./cmd/erebrus
          sha256sum "$BIN" > "$BIN.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: erebrus-linux-${{ matrix.arch }}
          path: erebrus-linux-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
