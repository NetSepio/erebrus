services:
  erebrus:
    build: .
    image: erebrus:v2
    container_name: erebrus
    restart: unless-stopped
    # NET_ADMIN + module access let the node bring up the WireGuard interface.
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      LOAD_CONFIG_FILE: "TRUE"
      RUNTYPE: "release"
      SERVER: "0.0.0.0"
      HTTP_PORT: "9080"
      NODE_NAME: "${NODE_NAME:-erebrus-node}"
      REGION: "${REGION:-unknown}"
      # Required: BIP-39 mnemonic (node identity/DID) and public endpoint host.
      MNEMONIC: "${MNEMONIC}"
      WG_ENDPOINT_HOST: "${WG_ENDPOINT_HOST}"
      NODE_API_TOKEN: "${NODE_API_TOKEN}"
      GATEWAY_URL: "${GATEWAY_URL:-}"
      # WireGuard fast path
      WG_CONF_DIR: "/etc/wireguard"
      WG_INTERFACE_NAME: "wg0"
      WG_ENDPOINT_PORT: "51820"
      WG_IPv4_SUBNET: "10.0.0.1/16"
      WG_DNS: "1.1.1.1"
      WG_POST_UP: "iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE"
      WG_POST_DOWN: "iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE"
      # Stealth carriers (sing-box): VLESS+REALITY and Hysteria2
      ENABLE_STEALTH: "true"
      VLESS_PORT: "8443"
      HYSTERIA2_PORT: "4443"
      REALITY_SERVER_NAMES: "www.microsoft.com"
      HYSTERIA2_OBFS_PASSWORD: "${HYSTERIA2_OBFS_PASSWORD:-}"
      # Node-local state (SQLite + generated secrets)
      STATE_DIR: "/var/lib/erebrus"
    ports:
      - "9080:9080/tcp"      # HTTP API
      - "51820:51820/udp"    # WireGuard
      - "8443:8443/tcp"      # VLESS + REALITY carrier
      - "4443:4443/udp"      # Hysteria2 carrier
    volumes:
      - erebrus-state:/var/lib/erebrus
      - erebrus-wireguard:/etc/wireguard

volumes:
  erebrus-state:
  erebrus-wireguard:
