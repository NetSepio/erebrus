# Traefik TLS termination for the optional public CID gateway.
# Include this overlay only when DROP_PUBLIC_GATEWAY_DOMAIN is set to a DNS
# name that points to the node. It exposes 443/tcp, terminates TLS with
# TLS-ALPN-01 ACME, and proxies only /ipfs/* to the internal Kubo gateway.
# The raw Kubo 8080 and 5001 ports are never published.
services:
  traefik:
    image: traefik:v3.7.7
    restart: unless-stopped
    depends_on:
      kubo:
        condition: service_healthy
    environment:
      DROP_PUBLIC_GATEWAY_DOMAIN: "${DROP_PUBLIC_GATEWAY_DOMAIN:-}"
      ACME_EMAIL: "${ACME_EMAIL:-noreply@erebrus.io}"
    ports:
      - "443:443/tcp"
    volumes:
      - traefik_letsencrypt:/letsencrypt
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        set -e
        mkdir -p /etc/traefik /letsencrypt
        touch /letsencrypt/acme.json
        chmod 600 /letsencrypt/acme.json

        cat > /etc/traefik/traefik.yml <<EOF
        global:
          checkNewVersion: false
          sendAnonymousUsage: false

        api:
          dashboard: false

        ping: {}

        log:
          level: ERROR

        entryPoints:
          traefik:
            address: ":8080"
          websecure:
            address: ":443"
            http:
              tls: true

        providers:
          file:
            filename: /etc/traefik/dynamic.yml

        certificatesResolvers:
          erebrus:
            acme:
              email: "$${ACME_EMAIL:-noreply@erebrus.io}"
              storage: /letsencrypt/acme.json
              tlsChallenge: {}
        EOF

        cat > /etc/traefik/dynamic.yml <<EOF
        http:
          routers:
            drop:
              rule: "Host(`$${DROP_PUBLIC_GATEWAY_DOMAIN}`) && PathPrefix(`/ipfs/`)"
              entryPoints: ["websecure"]
              service: kubo
              tls:
                certResolver: erebrus
              middlewares: ["cors"]
          services:
            kubo:
              loadBalancer:
                servers:
                  - url: "http://kubo:8080"
          middlewares:
            cors:
              headers:
                accessControlAllowOriginList:
                  - "*"
                accessControlAllowMethods:
                  - "GET"
                  - "HEAD"
                  - "OPTIONS"
                accessControlAllowHeaders:
                  - "*"
                accessControlMaxAge: 300
                addVaryHeader: true
        EOF

        exec traefik --configFile=/etc/traefik/traefik.yml
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  traefik_letsencrypt:
