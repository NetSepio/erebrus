services:
  adguardhome:
    image: adguard/adguardhome:latest
    restart: unless-stopped
    expose:
      - "53/tcp"
      - "53/udp"
      - "3000/tcp"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    healthcheck:
      test: ["CMD", "sh", "-c", "nslookup example.com 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  erebrus-node:
    image: ${EREBRUS_IMAGE:-ghcr.io/netsepio/erebrus:latest}
    build:
      context: ../..
      dockerfile: docker/erebrus-node.Dockerfile
    container_name: erebrus-shield
    restart: unless-stopped
    depends_on:
      adguardhome:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LOAD_CONFIG_FILE: "TRUE"
      EREBRUS_PROFILE: shield
      FIREWALL_PROVIDER: adguard_home
      FIREWALL_DNS_ADDR: adguardhome:53
      SHIELD_ADMIN_URL: http://adguardhome:3000
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "${WG_ENDPOINT_PORT:-51820}:${WG_ENDPOINT_PORT:-51820}/udp"
      - "${HTTP_PORT:-9080}:${HTTP_PORT:-9080}/tcp"
      - "${STEALTH_TCP_PORT:-443}:${STEALTH_TCP_PORT:-443}/tcp"
      - "${STEALTH_UDP_PORT:-443}:${STEALTH_UDP_PORT:-443}/udp"
    volumes:
      - erebrus_data:${STATE_DIR:-/var/lib/erebrus}
      - erebrus_wireguard:${WG_CONF_DIR:-/etc/wireguard}

volumes:
  erebrus_data:
  erebrus_wireguard:
  adguard_work:
  adguard_conf: